{% extends "base.html" %}
{% block title %}Portal Cliente | Login{% endblock %}
{% block content %}
<h2>Portal Cliente</h2>
<p>Ingresa con el correo y contraseña que te entregó recepción.</p>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
  <div class="grid">
    <input name="email" type="email" placeholder="correo@cliente.com" required />
    <input name="password" type="password" placeholder="Contraseña" required />
    <button type="submit">Ingresar</button>
  </div>
</form>
{% endblock %}
